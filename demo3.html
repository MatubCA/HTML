<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style type="text/css">
        * {
            padding: 0px;
            margin: 0px;
        }

        .nav {
            width: 600px;
            height: 60px;
            border: 1px solid rgb(104, 12, 158);
        }

        .nav ul {
            list-style: none;
        }

        .nav ul li {
            float: left;
            width: 100px;
            height: 60px;
            /* 垂直居中 */
            line-height: 60px;
            /* 水平居中 */
            text-align: center;
        }

        .nav ul li a {
            /* 填充块级元素 */
            display: block;
            text-decoration: none;
            font-size: 30px;
            font-family: 微软雅黑;
            width: 100px;
            height: 60px;

        }

        /* 两个伪类之间使用逗号隔开 */
        .nav ul li a:link,
        .nav ul li a:visited {
            color: black;
            background-color: rgb(107, 15, 168);
        }

        .nav ul li a:hover {
            background-color: rgb(194, 168, 23);
        }

        table{
            border: 1px solid red;
            width: 900px;
            height: 900px;
            border-collapse: collapse;
        }
        table td{
            border: 1px solid red;
        }
        table td:hover{
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="nav">
        <ul>
            <li><a href="#">博客园</a></li>
            <li><a href="#">首页</a></li>
            <li><a href="#">开源</a></li>
            <li><a href="#">归档</a></li>
            <li><a href="#">新随笔</a></li>
            <li><a href="#">管理</a></li>
        </ul>
    </div>
    <pre>



    </pre>
    <table>
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>


    </table>
</body>

</html>
