<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style type="text/css">
        p{
            color: aqua;
            font-size: 30px;
            font-family: 微软雅黑;
        }

        #div1{
            width: 0px;
            height: 0px;
            border-top: 30px solid red;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
        }
        .class1{
            color: brown;
        }
        .class2{
            font-size: 20px;
        }
        *{
            font-style: italic;
        }
        h3 b i{
            color: aqua;
        }
        h3 i{
            font-style: normal;
        }
        h3.class1{
            font-size: 20px;
            color: red;
            font-style: italic;
        }

        h3#id1{
            font-size: 30px;
            color: green;
            font-style: italic;
        }

        p,
        #div1,
        .class1,
        .class2{
            color: aqua;
            font-family: weiruanya;
        }

        a:link{
            color:aqua;
        }
        a:hover{
            color: black;
        }
        
        a:active{
            color: blue;
        }
        a:visited{
            color: brown;
            
        }
    
    </style>

</head>
<body>
    <p>山河无恙，故人相逢</p>

    <div id="div1"></div>

    <p class="class1" class="class2">我走过你走过的路</p>
    <div class="class1">吹过你吹过地方晚风</div>
    <h3>
        <b>
            <i>你最好有事！</i>
        </b>
    </h3>
    <h3 class="class1">今天风和日丽</h3>
    <h3 id="id1">吃了两大碗饭</h3>
    <h3>美滋滋</h3>
    <a href="baidu.com">google一下</a>
</body>
</html>
